<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daggerheart Widersacher</title>
  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>

  <link rel="stylesheet" href="../../../../shared/base.css">
  <link rel="stylesheet" href="../../../../shared/paper-pro-adversary.css">
  <link rel="stylesheet" href="../../../../shared/card.css">
</head>

<body>
  <div class="card-page">
    <div class="card">

      <div class="card-header">
        <h1></h1>
        <div class="tier-type">Typ <span class="gap">·</span> Stufe</div>
      </div>

      <div class="card-section">
        <h3>Beschreibung</h3>
      </div>

      <div class="card-section">
        <h3>Motive &amp; Taktiken</h3>
      </div>

      <div class="card-stats">
        <div class="card-stat">
          <div class="label">Schwierigkeit</div>
        </div>
        <div class="card-stat">
          <div class="label">Schwellen</div>
          <div class="value">/</div>
        </div>
        <div class="card-stat">
          <div class="label">HP</div>
          <div class="value"></div>
        </div>
        <div class="card-stat">
          <div class="label">Stress</div>
          <div class="value"></div>
        </div>
      </div>

      <div class="card-section">

        <div class="attack-line">
          <div>
            <span class="label">ATK</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Waffe</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Reichw.</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Schaden</span>
            <span class="fill"></span>
          </div>
        </div>
      </div>

      <div class="card-section">
        <h3>Erfahrungen</h3>
      </div>

      <div class="card-section">
        <h3>Merkmale</h3>
      </div>
    </div>

    <div class="card">

      <div class="card-header">
        <h1></h1>
        <div class="tier-type">Typ <span class="gap">·</span> Stufe</div>
      </div>

      <div class="card-section">
        <h3>Beschreibung</h3>
      </div>

      <div class="card-section">
        <h3>Motive &amp; Taktiken</h3>
      </div>

      <div class="card-stats">
        <div class="card-stat">
          <div class="label">Schwierigkeit</div>
        </div>
        <div class="card-stat">
          <div class="label">Schwellen</div>
          <div class="value">/</div>
        </div>
        <div class="card-stat">
          <div class="label">HP</div>
          <div class="value"></div>
        </div>
        <div class="card-stat">
          <div class="label">Stress</div>
          <div class="value"></div>
        </div>
      </div>

      <div class="card-section">

        <div class="attack-line">
          <div>
            <span class="label">ATK</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Waffe</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Reichw.</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Schaden</span>
            <span class="fill"></span>
          </div>
        </div>
      </div>

      <div class="card-section">
        <h3>Erfahrungen</h3>
      </div>

      <div class="card-section">
        <h3>Merkmale</h3>
      </div>
    </div>
  </div>
</body>

</html>
