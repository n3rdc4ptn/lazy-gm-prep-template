<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daggerheart Adversaries</title>
  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>

  <link rel="stylesheet" href="../../../../shared/base.css">
  <link rel="stylesheet" href="../../../../shared/paper-pro-adversary.css">
  <link rel="stylesheet" href="../../../../shared/card.css">
</head>

<body>
  <div class="card-page">
    <div class="card">

      <div class="card-header">
        <h1></h1>
        <div class="tier-type">Type <span class="gap">·</span> Tier</div>
      </div>

      <div class="card-section">
        <h3>Description</h3>
      </div>

      <div class="card-section">
        <h3>Motives &amp; Tactics</h3>
      </div>

      <div class="card-stats">
        <div class="card-stat">
          <div class="label">Difficulty</div>
        </div>
        <div class="card-stat">
          <div class="label">Thresholds</div>
          <div class="value">/</div>
        </div>
        <div class="card-stat">
          <div class="label">HP</div>
          <div class="value"></div>
        </div>
        <div class="card-stat">
          <div class="label">Stress</div>
          <div class="value"></div>
        </div>
      </div>

      <div class="card-section">

        <div class="attack-line">
          <div>
            <span class="label">ATK</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Weapon</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Range</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">DMG</span>
            <span class="fill"></span>
          </div>
        </div>
      </div>

      <div class="card-section">
        <h3>Experience</h3>
      </div>

      <div class="card-section">
        <h3>Features</h3>
      </div>
    </div>

    <div class="card">

      <div class="card-header">
        <h1></h1>
        <div class="tier-type">Type <span class="gap">·</span> Tier</div>
      </div>

      <div class="card-section">
        <h3>Description</h3>
      </div>

      <div class="card-section">
        <h3>Motives &amp; Tactics</h3>
      </div>

      <div class="card-stats">
        <div class="card-stat">
          <div class="label">Difficulty</div>
        </div>
        <div class="card-stat">
          <div class="label">Thresholds</div>
          <div class="value">/</div>
        </div>
        <div class="card-stat">
          <div class="label">HP</div>
          <div class="value"></div>
        </div>
        <div class="card-stat">
          <div class="label">Stress</div>
          <div class="value"></div>
        </div>
      </div>

      <div class="card-section">

        <div class="attack-line">
          <div>
            <span class="label">ATK</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Weapon</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">Range</span>
            <span class="fill"></span>
          </div>
          <div>
            <span class="label">DMG</span>
            <span class="fill"></span>
          </div>
        </div>
      </div>

      <div class="card-section">
        <h3>Experience</h3>
      </div>

      <div class="card-section">
        <h3>Features</h3>
      </div>
    </div>
  </div>
</body>

</html>
